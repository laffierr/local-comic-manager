name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cp app/build/outputs/apk/release/app-release.apk "local-comic-manager-${VERSION}.apk"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: local-comic-manager-*.apk
          generate_release_notes: true
